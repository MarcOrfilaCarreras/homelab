---
- hosts: docker
  become: yes
  
  tasks:
    - include_vars: "{{ vars_folder }}"

    - name: Create user and database
      community.docker.docker_container_exec:
        container: mariadb
        command: mysql -u {{ mariadb_user }} --password={{ mariadb_user_password }} --execute="CREATE USER IF NOT EXISTS '{{ duplicati_dashboard_user }}'@'%' IDENTIFIED BY '{{ duplicati_dashboard_password }}';GRANT USAGE ON *.* TO '{{ duplicati_dashboard_user }}'@'%' REQUIRE NONE WITH MAX_QUERIES_PER_HOUR 0 MAX_CONNECTIONS_PER_HOUR 0 MAX_UPDATES_PER_HOUR 0 MAX_USER_CONNECTIONS 0;CREATE DATABASE IF NOT EXISTS {{ duplicati_dashboard_user }};GRANT ALL PRIVILEGES ON {{ duplicati_dashboard_user }}.* TO '{{ duplicati_dashboard_user }}'@'%';"

    - name: Create dir
      file: 
        path: /opt/docker/duplicati-dashboard/backend
        state: directory

    - name: Check if file exists
      stat:
        path: /opt/docker/duplicati-dashboard/backend/settings.json
      register: settings_backend

    - name: Download settings.json
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/MarcOrfilaCarreras/duplicati-dashboard/master/backend/settings.json
        dest: /opt/docker/duplicati-dashboard/backend
        mode: '0766'
      when: not settings_backend.stat.exists

    - name: Deploy Backend
      community.docker.docker_container:
        name: duplicati_dashboard_backend
        recreate: yes
        image: ghcr.io/marcorfilacarreras/duplicati-dashboard:backend
        ports:
          - "127.0.0.1:9006:80"
        volumes:
          - "/opt/docker/duplicati-dashboard/backend/settings.json:/app/settings.json"
        restart_policy: always
        labels:
            com.centurylinklabs.watchtower.enable: "true"

    - name: Create dir
      file: 
        path: /opt/docker/duplicati-dashboard/frontend
        state: directory

    - name: Check if file exists
      stat:
        path: /opt/docker/duplicati-dashboard/backend/settings.json
      register: settings_frontend

    - name: Download settings.json
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/MarcOrfilaCarreras/duplicati-dashboard/master/frontend/settings.json
        dest: /opt/docker/duplicati-dashboard/frontend
        mode: '0766'
      when: not settings_frontend.stat.exists
    
    - name: Deploy Frontend
      community.docker.docker_container:
        name: duplicati_dashboard_frontend
        recreate: yes
        image: ghcr.io/marcorfilacarreras/duplicati-dashboard:frontend
        ports:
          - "127.0.0.1:9007:80"
        volumes:
          - "/opt/docker/duplicati-dashboard/frontend/settings.json:/app/settings.json"
        links:
          duplicati_dashboard_backend:duplicati_dashboard_backend
        restart_policy: always
        labels:
          homepage.group: Management
          homepage.name: Duplicati Dashboard
          homepage.href: https://duplicati-dashboard-web.{{ domain }}
          homepage.description: Dashboard for Duplicati
          com.centurylinklabs.watchtower.enable: "true"
