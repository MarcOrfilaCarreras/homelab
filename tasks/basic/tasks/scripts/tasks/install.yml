---
- hosts: docker
  become: true

  tasks:
    - include_vars: ../../../../../vars/main.json

    - name: Install all dependencies
      ansible.builtin.package:
        name:
          - inotify-tools
        state: latest
        update_cache: yes

    # UFW

    - name: Create the directory
      file:
          path: /opt/scripts
          state: directory
          owner: root
          group: root

    - name: Create systemd service
      template:
          src: ../templates/ufwscript.service.j2
          dest: /lib/systemd/system/ufwscript.service
          owner: root
          group: root

    - name: Create the script file
      ansible.builtin.template:
        src: ../templates/ufw.sh.j2
        dest: /opt/scripts/ufw.sh
        owner: root
        group: root
        mode: '0774'

    - name: Restart the service
      ansible.builtin.service:
        name: ufwscript
        state: restarted
        enabled: yes

    # SSH

    - name: Add line to .profile
      ansible.builtin.blockinfile:
        path: /home/{{ user_systemd }}/.profile
        block: |
          /opt/scripts/ssh.sh

    - name: Create script
      copy:
        dest: "/opt/scripts/ssh.sh"
        content: |
          #!/bin/bash
          IP=$(echo $SSH_CLIENT | awk '{ print $1}')
          /opt/cli/seq/seqcli log -l Warning -m "Someone is in the server." -p Server=$(hostname) -p ForeignIP=$(echo $IP) -p Service=SSH
    
    - name: Adding "+x"
      file:
        dest: /opt/scripts/ssh.sh
        mode: a+x

    # Caddy

    - name: Create the directory
      file:
          path: /var/log/caddy
          state: directory
          owner: "{{ user_systemd }}"
          group: "{{ group_systemd }}"

    - name: Create systemd service
      template:
          src: ../templates/caddyinjest.service.j2
          dest: /lib/systemd/system/caddyinjest.service
          owner: root
          group: root

    - name: Create systemd timer
      template:
          src: ../templates/caddyinjest.timer.j2
          dest: /lib/systemd/system/caddyinjest.timer
          owner: root
          group: root

    - name: Restart the service
      ansible.builtin.service:
        name: caddyinjest
        state: restarted
        enabled: yes
    
    - name: Restart the timer
      ansible.builtin.service:
        name: caddyinjest.timer
        state: restarted
        enabled: yes

    - name: Just force systemd to reread configs (2.4 and above)
      ansible.builtin.systemd:
        daemon_reload: true